<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dial-a-ton</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="dial-container">
        <div id="dial1">
            <div class="dial-1-inner"></div>
        </div>
        <div id="dial2">
            <div class="dial-2-inner"></div>
        </div>
        <div id="dial3">
            <div class="dial-3-stroke"></div>
        </div>
<div id="dial4">
    <div class="dial-4-stroke-top"></div>     
    <div class="dial-4-stroke-right"></div>   
    <div class="dial-4-stroke-bottom"></div>  
    <div class="dial-4-stroke-left"></div>   
</div>
        <div id="dial5">
            <div class="dial-5-dot-indicator"></div>
            <div class="dial-5-dot"></div>
            <div class="dial-5-dot"></div>
            <div class="dial-5-dot"></div>
            <div class="dial-5-dot"></div>
            <div class="dial-5-dot"></div>
            <div class="dial-5-dot"></div>
            <div class="dial-5-dot"></div>
            <div class="dial-5-dot"></div>
            <div class="dial-5-dot"></div>
        </div>
        <div id="dial6">
            <div class="dial-6-inner">
                <div class="dial-6-stroke"></div>
            </div>
        </div>
        <div id="dial7">
            <div class="dial-7-inner-stroke"></div>
            <div class="dial-7-inner-circle"></div>
        </div>
        <div id="dial8">
            <div class="ring-1">
                <div class="ring-2">
                    <div class="ring-3"></div>
                </div>
            </div>
        </div>
        <div id="dial9">
            <div class="dial-9-hole"></div>
        </div>
        <div id="dial10">
            <div class="square">
                <div class="circle"></div>
            </div>
        </div>
        <div id="dial11">
            <div class="dial11-indicator"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
            <div class="dial11-stroke"></div>
        </div>
        <div id="dial12">
            <div class="inner-circle"></div>
            <div class="dial12-hole"></div>
            <div class="dial12-hole"></div>
            <div class="dial12-hole"></div>
        </div>
        <div id="dial13">
            <div class="dial13-clock-stroke"></div>
            <div class="dial13-clock-stroke"></div>
            <div class="dial13-clock-stroke"></div>
            <div class="circle-13"></div>
        </div>
        <div id="dial14">
            <div class="dial14-clock-stroke"></div>
            <div class="dial14-clock-stroke"></div>
            <div class="dial14-clock-stroke"></div>
            <div class="circle-14"></div>
        </div>
        <div id="dial15">
            <div class="pill-shape">
                <div class="pill-top"></div>
                <div class="pill-bottom"></div>
            </div>
        </div>
        <div id="dial16">
            <div class="chip">
                <div class="chip-pin-top"></div>
                <div class="chip-body">
                    <div class="chip-pin-left"></div>
                    <div class="chip-hole"></div>
                    <div class="chip-pin-right"></div>
                </div>
                <div class="chip-pin-bottom"></div>
            </div>
        </div>
        <div id="dial17">
            <div class="dial17-ring"></div>
            <div class="dial17-stroke"></div>
        </div>
        <div id="dial18">
            <div class="dial18-arc-left"></div>
            <div class="dial18-arc-right"></div>
            <div class="dial18-stroke-top"></div>
            <div class="dial18-stroke-bottom"></div>
        </div>
        <div id="dial19">
            <div class="left-cross-axis"></div>
            <div class="right-cross-axis"></div>
            <div class="dial19-top-left-circle"></div>
            <div class="dial19-top-right-circle"></div>
            <div class="dial19-bottom-left-circle"></div>
            <div class="dial19-bottom-right-circle"></div>
            <div class="dial19-center-circle"></div>
        </div>
        <div id="dial20">
            <div class="dial20-triangle"></div>
            <div class="dial20-circle"></div>
        </div>
        <div id="dial21">
            <div class="dial21-triangle"></div>
            <div class="dial21-stroke-left"></div>
            <div class="dial21-stroke-right"></div>
            <div class="dial21-circle"></div>
        </div>
        <div id="dial22">
            <div class="dial22-circle"></div>
            <div class="dial22-spoke"></div>
            <div class="dial22-spoke"></div>
            <div class="dial22-spoke"></div>
            <div class="dial22-spoke"></div>
            <div class="dial22-spoke"></div>
            <div class="dial22-spoke"></div>
            <div class="dial22-spoke"></div>
            <div class="dial22-spoke"></div>
            <div class="dial22-center"></div>
        </div>
        <div id="dial23">
            <div class="dial23-circle">
                <div class="dial23-wedge"></div>
                <div class="dial23-center"></div>
            </div>
        </div>
        <div id="dial24">
            <div class="dial24-hole-top"></div>
            <div class="dial24-hole-bottom"></div>
        </div>
        <div id="dial25">
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-stroke"></div>
            <div class="dial25-drop"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
